name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install jsonschema

      - name: Validate JSON syntax
        run: |
          echo "Validating all manifest.json files are valid JSON..."
          find . -name "manifest.json" -not -path "./.github/*" -not -path "./.auto-claude/*" -not -path "./templates/*" -print0 | while IFS= read -r -d '' file; do
            python3 -c "import json, sys; json.load(open(sys.argv[1]))" "$file" || exit 1
          done
          echo "All manifests are valid JSON."

      - name: Validate against JSON Schema
        run: python3 scripts/validate_manifests.py --strict

      - name: Check no hardcoded placeholder data
        run: |
          python3 -c "
          import json, pathlib, sys
          errors = []
          for p in pathlib.Path('.').rglob('manifest.json'):
              if any(d in p.parts for d in ['.github', '.auto-claude', 'templates', 'defaults']):
                  continue
              data = json.loads(p.read_text())
              if data.get('rating') == 4.5:
                  errors.append(f'{p}: hardcoded rating 4.5 -- remove this field (ratings come from backend)')
              if data.get('downloads') is not None:
                  errors.append(f'{p}: hardcoded downloads -- remove this field (downloads come from backend)')
          if errors:
              print('Placeholder data detected:')
              for e in errors:
                  print(f'  {e}')
              sys.exit(1)
          print('No placeholder data found.')
          "

      - name: Security scan - detect secrets
        run: |
          python3 scripts/security_scan.py --strict

      - name: Check index.json is up-to-date (PRs)
        if: github.event_name == 'pull_request'
        run: python3 scripts/build_index.py --check

      - name: Rebuild and commit index.json (main push)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          python3 scripts/build_index.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.json
          if git diff --staged --quiet; then
            echo "index.json unchanged"
          else
            git commit -m "chore: regenerate index.json [skip ci]"
            git push
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install jsonschema pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --cov=scripts --cov-report=term-missing
