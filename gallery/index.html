<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UI Craftsman Gallery</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: #1a1d2e;
      border-bottom: 1px solid #2d3148;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: -0.02em;
    }

    header .subtitle {
      font-size: 0.8rem;
      color: #64748b;
    }

    #controls {
      padding: 16px 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      background: #151722;
      border-bottom: 1px solid #1e2133;
    }

    #controls select {
      background: #1e2133;
      color: #e2e8f0;
      border: 1px solid #2d3148;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
      min-width: 130px;
    }

    #controls select:focus {
      border-color: #7c3aed;
    }

    #count {
      font-size: 0.8rem;
      color: #64748b;
      margin-left: auto;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding: 24px;
    }

    .card {
      background: #1a1d2e;
      border: 1px solid #2d3148;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: border-color 0.15s, transform 0.15s;
    }

    .card:hover {
      border-color: #7c3aed;
      transform: translateY(-2px);
    }

    .card-thumb {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: #0f1117;
      display: block;
    }

    .card-thumb-placeholder {
      width: 100%;
      height: 160px;
      background: #0f1117;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #2d3148;
      font-size: 2rem;
    }

    .card-body {
      padding: 12px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e2e8f0;
    }

    .card-author {
      font-size: 0.75rem;
      color: #64748b;
    }

    .card-prompt {
      font-size: 0.78rem;
      color: #94a3b8;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 2px;
    }

    .tag {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 500;
      background: #2d3148;
      color: #a5b4fc;
    }

    .tag-aesthetic {
      background: #3b1d6b;
      color: #c4b5fd;
    }

    .tag-mode {
      background: #1e3a5f;
      color: #93c5fd;
    }

    .card-actions {
      display: flex;
      gap: 6px;
      padding: 10px 12px;
      border-top: 1px solid #2d3148;
    }

    .btn {
      flex: 1;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #2d3148;
      background: #1e2133;
      color: #e2e8f0;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.12s, border-color 0.12s;
      text-align: center;
    }

    .btn:hover {
      background: #2d3148;
      border-color: #7c3aed;
    }

    .btn-copy.copied {
      background: #14532d;
      border-color: #16a34a;
      color: #86efac;
    }

    #empty, #error {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      gap: 12px;
      color: #64748b;
      font-size: 0.95rem;
    }

    #empty .icon, #error .icon {
      font-size: 2.5rem;
    }

    #error { color: #f87171; }

    #spinner {
      display: flex;
      justify-content: center;
      padding: 80px;
    }

    .spin {
      width: 36px;
      height: 36px;
      border: 3px solid #2d3148;
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<header>
  <h1>UI Craftsman Gallery</h1>
  <span class="subtitle">Community designs — copy prompts, browse aesthetics</span>
</header>

<div id="controls">
  <select id="filter-aesthetic" aria-label="Filter by aesthetic">
    <option value="">All aesthetics</option>
    <option value="terminal-pro">terminal-pro</option>
    <option value="bold-brand">bold-brand</option>
    <option value="data-rich">data-rich</option>
    <option value="minimal-light">minimal-light</option>
    <option value="enterprise">enterprise</option>
  </select>

  <select id="filter-mode" aria-label="Filter by mode">
    <option value="">All modes</option>
    <option value="ref">ref</option>
    <option value="show">show</option>
    <option value="system">system</option>
  </select>

  <select id="filter-tag" aria-label="Filter by tag">
    <option value="">All tags</option>
  </select>

  <select id="sort" aria-label="Sort order">
    <option value="newest">Newest first</option>
    <option value="recent-author">Most recent author</option>
  </select>

  <span id="count"></span>
</div>

<div id="spinner"><div class="spin"></div></div>

<div id="error" class="hidden">
  <span class="icon">⚠</span>
  <span id="error-msg">Gallery unavailable — check your connection</span>
</div>

<div id="empty" class="hidden">
  <span class="icon">🎨</span>
  <span>No designs yet — share yours with /ui-share!</span>
</div>

<div id="grid"></div>

<script>
(function () {
  'use strict';

  var allEntries = [];
  var filteredEntries = [];

  var elSpinner = document.getElementById('spinner');
  var elError   = document.getElementById('error');
  var elEmpty   = document.getElementById('empty');
  var elGrid    = document.getElementById('grid');
  var elCount   = document.getElementById('count');
  var selAesthetic = document.getElementById('filter-aesthetic');
  var selMode      = document.getElementById('filter-mode');
  var selTag       = document.getElementById('filter-tag');
  var selSort      = document.getElementById('sort');

  function hide(el) { el.classList.add('hidden'); }
  function show(el) { el.classList.remove('hidden'); }

  function populateTagFilter(entries) {
    var seen = {};
    entries.forEach(function (e) {
      (e.tags || []).forEach(function (t) { seen[t] = true; });
    });
    var tags = Object.keys(seen).sort();
    tags.forEach(function (t) {
      var opt = document.createElement('option');
      opt.value = t;
      opt.textContent = t;
      selTag.appendChild(opt);
    });
  }

  function applyFilters() {
    var aesthetic = selAesthetic.value;
    var mode      = selMode.value;
    var tag       = selTag.value;
    var sort      = selSort.value;

    var result = allEntries.filter(function (e) {
      if (aesthetic && e.aesthetic !== aesthetic) return false;
      if (mode && e.mode !== mode) return false;
      if (tag && !(e.tags || []).includes(tag)) return false;
      return true;
    });

    if (sort === 'newest') {
      result.sort(function (a, b) {
        return (b.created || '').localeCompare(a.created || '');
      });
    } else {
      // Most recent author: group by author's latest entry date
      var latestByAuthor = {};
      result.forEach(function (e) {
        var prev = latestByAuthor[e.author] || '';
        if ((e.created || '') > prev) latestByAuthor[e.author] = e.created || '';
      });
      result.sort(function (a, b) {
        var diff = (latestByAuthor[b.author] || '').localeCompare(latestByAuthor[a.author] || '');
        if (diff !== 0) return diff;
        return (b.created || '').localeCompare(a.created || '');
      });
    }

    filteredEntries = result;
    renderGrid();
  }

  function renderGrid() {
    // Clear existing cards
    while (elGrid.firstChild) elGrid.removeChild(elGrid.firstChild);

    elCount.textContent = filteredEntries.length + ' design' + (filteredEntries.length !== 1 ? 's' : '');

    if (filteredEntries.length === 0) {
      show(elEmpty);
      hide(elGrid);
      return;
    }

    hide(elEmpty);
    show(elGrid);

    filteredEntries.forEach(function (entry) {
      elGrid.appendChild(buildCard(entry));
    });
  }

  function buildCard(entry) {
    var card = document.createElement('div');
    card.className = 'card';

    // Thumbnail
    if (entry.screenshot_url) {
      var img = document.createElement('img');
      img.className = 'card-thumb';
      img.src = entry.screenshot_url;
      img.crossOrigin = 'anonymous';
      // alt must be set via textContent-equivalent property
      img.alt = entry.title || 'Design preview';
      card.appendChild(img);
    } else {
      var ph = document.createElement('div');
      ph.className = 'card-thumb-placeholder';
      ph.textContent = '🖼';
      card.appendChild(ph);
    }

    // Body
    var body = document.createElement('div');
    body.className = 'card-body';

    var title = document.createElement('div');
    title.className = 'card-title';
    title.textContent = entry.title || '(untitled)';
    body.appendChild(title);

    var author = document.createElement('div');
    author.className = 'card-author';
    author.textContent = 'by ' + (entry.author || 'unknown');
    body.appendChild(author);

    var prompt = document.createElement('div');
    prompt.className = 'card-prompt';
    prompt.textContent = entry.prompt || '';
    body.appendChild(prompt);

    // Tags
    var tagsRow = document.createElement('div');
    tagsRow.className = 'card-tags';

    if (entry.aesthetic) {
      var tAes = document.createElement('span');
      tAes.className = 'tag tag-aesthetic';
      tAes.textContent = entry.aesthetic;
      tagsRow.appendChild(tAes);
    }

    if (entry.mode) {
      var tMode = document.createElement('span');
      tMode.className = 'tag tag-mode';
      tMode.textContent = entry.mode;
      tagsRow.appendChild(tMode);
    }

    (entry.tags || []).slice(0, 3).forEach(function (t) {
      var tTag = document.createElement('span');
      tTag.className = 'tag';
      tTag.textContent = t;
      tagsRow.appendChild(tTag);
    });

    body.appendChild(tagsRow);
    card.appendChild(body);

    // Actions
    var actions = document.createElement('div');
    actions.className = 'card-actions';

    var btnCopy = document.createElement('button');
    btnCopy.className = 'btn btn-copy';
    btnCopy.textContent = 'Copy prompt';
    btnCopy.addEventListener('click', function () {
      navigator.clipboard.writeText(entry.prompt || '').then(function () {
        btnCopy.textContent = 'Copied!';
        btnCopy.classList.add('copied');
        setTimeout(function () {
          btnCopy.textContent = 'Copy prompt';
          btnCopy.classList.remove('copied');
        }, 1800);
      }).catch(function () {
        btnCopy.textContent = 'Copy failed';
        setTimeout(function () { btnCopy.textContent = 'Copy prompt'; }, 1800);
      });
    });
    actions.appendChild(btnCopy);

    if (entry.component_url) {
      var btnView = document.createElement('button');
      btnView.className = 'btn';
      btnView.textContent = 'View component';
      btnView.addEventListener('click', function () {
        window.open(entry.component_url, '_blank');
      });
      actions.appendChild(btnView);
    }

    card.appendChild(actions);
    return card;
  }

  // Wire up controls
  selAesthetic.addEventListener('change', applyFilters);
  selMode.addEventListener('change', applyFilters);
  selTag.addEventListener('change', applyFilters);
  selSort.addEventListener('change', applyFilters);

  // Fetch data
  fetch('./index.json')
    .then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function (data) {
      hide(elSpinner);
      allEntries = (data && Array.isArray(data.entries)) ? data.entries : [];
      populateTagFilter(allEntries);
      applyFilters();
    })
    .catch(function () {
      hide(elSpinner);
      show(elError);
    });
}());
</script>
</body>
</html>
